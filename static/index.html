<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleGemini Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>TeleGemini Assistant</h1>
            <p>Ask questions. I will scrape your Telegram chat and give you the answer.</p>
        </header>
        
        <div class="chat-container" id="chat-container">
            <div class="message bot">
                <div class="message-content">
                    Hello! I'm ready. When you ask a question, I will dynamically scrape your Telegram chat and use Gemini to provide an answer!
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="question-input" placeholder="e.g., What was the latest announcement?" autocomplete="off">
            <button id="send-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
